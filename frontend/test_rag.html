    <main class="rag-main">
        <section class="rag-panel rag-panel-left">
            <h3>Knowledge Base</h3>
            <p>Review the existing context and select the most relevant sources for your query.</p>

                <li>Relevant documents</li>
                <li>Trusted references</li>

            </ul>
        </section>

        <section class="rag-panel rag-panel-right">
            <h3>Chat</h3>
            <div id="chat-conversation" class="chat-conversation"></div>
            <form class="rag-card chat-form">
                <input type="text" aria-label="Search Bar" id="rag-search" placeholder="I want to ask... ">
            </form>
        </section>
    </main>
